{% extends 'Teacher/Header.html' %}
{% block content %}

<style>

.editprofile-wrapper{
display:flex;
justify-content:center;
align-items:center;
padding:60px 20px;
}

.editprofile-card{
width:460px;
background:white;
border-radius:14px;
box-shadow:0 15px 35px rgba(0,0,0,0.15);
padding:30px;
animation:fadeUp 0.6s ease;
}

@keyframes fadeUp{
from{opacity:0;transform:translateY(25px);}
to{opacity:1;transform:translateY(0);}
}

.editprofile-title{
text-align:center;
font-size:24px;
font-weight:600;
margin-bottom:20px;
color:#2c3e50;
}

.profile-photo-preview{
display:flex;
justify-content:center;
margin-bottom:20px;
}

.profile-photo-preview img{
width:110px;
height:110px;
border-radius:50%;
object-fit:cover;
border:4px solid #eee;
}

.editprofile-table{
width:100%;
border-collapse:collapse;
}

.editprofile-table td{
padding:10px;
}

.editprofile-input{
width:100%;
padding:9px;
border-radius:6px;
border:1px solid #ccc;
transition:0.3s;
}

.editprofile-input:focus{
outline:none;
border-color:#3498db;
box-shadow:0 0 6px rgba(52,152,219,0.4);
}

.validation-text{
font-size:12px;
margin-top:4px;
}

.editprofile-btn-row{
text-align:center;
padding-top:10px;
}

.update-btn{
background:linear-gradient(135deg,#3498db,#5dade2);
color:white;
border:none;
padding:10px 22px;
border-radius:6px;
cursor:pointer;
font-weight:500;
transition:0.3s;
}

.update-btn:hover{
transform:scale(1.05);
box-shadow:0 6px 15px rgba(0,0,0,0.2);
}

/* TOAST */

.toast{
position:fixed;
top:30px;
right:30px;
background:#2ecc71;
color:white;
padding:12px 20px;
border-radius:6px;
box-shadow:0 6px 20px rgba(0,0,0,0.2);
opacity:0;
transition:0.4s;
}

.toast.show{
opacity:1;
}

</style>

<div class="editprofile-wrapper">

<div class="editprofile-card">

<div class="editprofile-title">
Edit Profile
</div>

<div class="profile-photo-preview">
<img id="previewPhoto" src="{{teacher.teacher_photo.url}}">
</div>

<form action="" method="post" enctype="multipart/form-data">

{% csrf_token %}

<table class="editprofile-table">

<tr>
<td>Name</td>
<td>
<input type="text"
required
name="txt_name"
id="txt_name"
value="{{teacher.teacher_name}}"
class="editprofile-input"
pattern="^[A-Z]+[a-zA-Z ]*$">
</td>
</tr>

<tr>
<td>Email</td>
<td>
<input type="email"
required
name="txt_email"
id="txt_email"
value="{{teacher.teacher_email}}"
class="editprofile-input">
</td>
</tr>

<tr>
<td>Contact</td>
<td>
<input type="text"
required
name="txt_contact"
id="txt_contact"
value="{{teacher.teacher_contact}}"
class="editprofile-input"
pattern="[6-9]{1}[0-9]{9}"
onkeyup="validatePhone()">

<div id="phoneMsg" class="validation-text"></div>

</td>
</tr>

<tr>
<td>Change Photo</td>
<td>
<input type="file" name="file_photo" id="file_photo" class="editprofile-input" onchange="previewImage(event)">
</td>
</tr>

<tr>
<td colspan="2" class="editprofile-btn-row">
<input type="submit" value="Update" class="update-btn">
</td>
</tr>

</table>

</form>

</div>

</div>

<div id="toastMsg" class="toast">
Profile Updated Successfully
</div>

<script>

function previewImage(event){

var reader=new FileReader();

reader.onload=function(){
var output=document.getElementById('previewPhoto');
output.src=reader.result;
}

reader.readAsDataURL(event.target.files[0]);

}


function validatePhone(){

var phone=document.getElementById("txt_contact").value;
var msg=document.getElementById("phoneMsg");

var pattern=/^[6-9][0-9]{9}$/;

if(pattern.test(phone)){

msg.innerHTML="Valid Phone Number ✔";
msg.style.color="green";

}else{

msg.innerHTML="Invalid Phone Number ✖";
msg.style.color="red";

}

}


function showToast(){

var toast=document.getElementById("toastMsg");
toast.classList.add("show");

setTimeout(function(){
toast.classList.remove("show");
},3000);

}

</script>

{% if msg %}

<script>
showToast()
setTimeout(function(){
window.location="{% url 'Teacher:Myprofile' %}"
},2000)
</script>

{% endif %}

{% endblock %}
