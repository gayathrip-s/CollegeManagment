<!DOCTYPE html>
<html>

<head>
    <title>View Attendance</title>

    

</head>

<body>

    <div class="container">

        <h2>Attendance Details</h2>

        <form method="post">
            {% csrf_token %}

            Select Semester:

            <select name="sel_semester" required>

                <option value="">-- Select Semester --</option>

                {% for s in semesterdata %}

                <option value="{{ s.id }}" {% if s.id|stringformat:"s" == selected_semester %}selected{% endif %}>
                    {{ s.semester_name }}
                </option>

                {% endfor %}

            </select>

            Select Date:

            <input type="date" name="sel_date" value="{{selected_date}}">

            <button type="submit">View</button>

        </form>

        <hr>

        <form method="post" action="{% url 'Teacher:updateattendance' %}">
            {% csrf_token %}

            <table border="1">

                <tr>
                    <th>Date</th>
                    <th>Subject</th>
                    <th>Teacher</th>
                    <th>Hour</th>
                    <th>Status</th>
                </tr>

                {% for a in attendancedata %}

                <tr>

                    <td>{{ a.date }}</td>

                    <td>{{ a.subject.subject_name }}</td>

                    <td>{{ a.teacher.teacher_name }}</td>

                    <td>{{ a.hour }}</td>

                    <td>

                        <select name="status_{{a.id}}">

                            <option value="1" {% if a.status == 1 %}selected{% endif %}>Present</option>

                            <option value="0" {% if a.status == 0 %}selected{% endif %}>Absent</option>

                        </select>

                        <input type="hidden" name="attendance_id" value="{{a.id}}">

                    </td>

                </tr>

                {% empty %}

                <tr>
                    <td colspan="5">No attendance records found</td>
                </tr>

                {% endfor %}

            </table>

            <br>

            <button type="submit" class="savebtn">Update Attendance</button>

        </form>

    </div>

</body>

</html>
