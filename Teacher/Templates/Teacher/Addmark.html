{% extends 'Teacher/Header.html' %}
{% block content %}

<style>

.mark-page{
display:flex;
justify-content:center;
align-items:center;
padding:60px 20px;
}

.mark-card{
width:420px;
background:#ffffff;
border-radius:12px;
box-shadow:0 12px 30px rgba(0,0,0,0.15);
padding:30px;
animation:fadeInUp 0.6s ease;
}

@keyframes fadeInUp{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.mark-title{
text-align:center;
font-size:24px;
font-weight:600;
margin-bottom:25px;
color:#2c3e50;
}

.mark-form-table{
width:100%;
border-collapse:collapse;
}

.mark-form-table td{
padding:10px;
}

.mark-input{
width:100%;
padding:10px;
border-radius:6px;
border:1px solid #ccc;
font-size:15px;
transition:0.3s;
}

.mark-input:focus{
outline:none;
border-color:#3498db;
box-shadow:0 0 5px rgba(52,152,219,0.4);
}

.submit-row{
text-align:center;
padding-top:10px;
}

.mark-submit-btn{
background:#3498db;
color:white;
border:none;
padding:10px 22px;
border-radius:6px;
font-size:15px;
cursor:pointer;
transition:0.3s;
}

.mark-submit-btn:hover{
background:#2c80b4;
transform:scale(1.05);
}

</style>

<div class="mark-page">

<div class="mark-card">

<div class="mark-title">
Add Assignment Mark
</div>

<form action="" method="post">

{% csrf_token %}

<table class="mark-form-table">

<tr>
<td>Marks</td>
<td>
<input type="text" required name="txt_mark" id="txt_mark" class="mark-input">
</td>
</tr>

<tr>
<td colspan="2" class="submit-row">
<input type="submit" value="Submit" class="mark-submit-btn">
</td>
</tr>

</table>

</form>

</div>

</div>

{% endblock %}

{% if msg %}

<script>
alert("{{msg}}")
window.location="{% url 'Teacher:Addmark' aid %}"
</script>

{% endif %}
