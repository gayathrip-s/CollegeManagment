{% extends 'Teacher/Head.html' %}
{% load static %}

{% block content %}
<div class="container-fluid py-4">
    <div class="row pt-5 justify-content-center">
        <div class="col-lg-4">
            <!-- Header Section -->
            <div class="text-center mb-5">
                <div class="bg-primary bg-opacity-10 text-primary p-4 rounded-circle d-inline-block mb-3">
                    <i class="fas fa-edit fa-3x"></i>
                </div>
                <h2 class="h3 fw-bold mb-1">Grade Submission</h2>
                <p class="text-muted small mb-0">Evaluate student work and allocate assessment scores</p>
            </div>

            <!-- Grade Card -->
            <div class="card bg-white bg-opacity-5 border border-white border-opacity-10 rounded-4 shadow-sm animate-slideIn">
                <div class="card-body p-5">
                    <form action="" method="post">
                        {% csrf_token %}
                        <div class="mb-4">
                            <label class="form-label text-muted small fw-bold uppercase">Assessment Score</label>
                            <input type="number" step="0.5" name="txt_mark" class="form-control bg-dark border-secondary text-white py-3 fs-3 text-center fw-bold" placeholder="0.0" required shadow-sm min="0" max="100">
                            <div class="smaller text-muted mt-3 text-center opacity-75">
                                Ensure the score is based on the predefined rubric for this task.
                            </div>
                        </div>
                        <div class="d-grid mt-5">
                            <button type="submit" class="btn btn-primary py-3 rounded-pill shadow-sm fw-bold">
                                <i class="fas fa-cloud-upload-alt me-2"></i>Post Academic Grade
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

{% if msg %}
<script>
    alert("{{msg}}");
</script>
{% endif %}
{% endblock %}
