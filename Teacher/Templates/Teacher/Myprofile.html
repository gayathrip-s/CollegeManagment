{% extends 'Teacher/Header.html' %}
{% block content %}

<style>

.profile-wrapper{
display:flex;
justify-content:center;
align-items:center;
padding:50px;
}

.profile-card{
width:420px;
background:white;
border-radius:16px;
box-shadow:0 15px 35px rgba(0,0,0,0.15);
padding:30px;
text-align:center;
animation:fadeUp 0.6s ease;
}

@keyframes fadeUp{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

.profile-img{
width:130px;
height:130px;
border-radius:50%;
object-fit:cover;
border:4px solid #3498db;
margin-bottom:15px;
}

.profile-name{
font-size:22px;
font-weight:600;
color:#2c3e50;
margin-bottom:20px;
}

.profile-table{
width:100%;
border-collapse:collapse;
margin-bottom:20px;
}

.profile-table td{
padding:10px;
border-bottom:1px solid #eee;
text-align:left;
}

.profile-label{
font-weight:600;
color:#555;
}

.profile-actions{
display:flex;
justify-content:center;
gap:15px;
}

.profile-btn{
text-decoration:none;
padding:9px 16px;
border-radius:6px;
font-size:14px;
color:white;
transition:0.3s;
}

.edit-btn{
background:#3498db;
}

.password-btn{
background:#e67e22;
}

.profile-btn:hover{
transform:scale(1.05);
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

</style>

<div class="profile-wrapper">

<div class="profile-card">

<img src="{{teacher.teacher_photo.url}}" class="profile-img">

<div class="profile-name">
{{teacher.teacher_name}}
</div>

<table class="profile-table">

<tr>
<td class="profile-label">Email</td>
<td>{{teacher.teacher_email}}</td>
</tr>

<tr>
<td class="profile-label">Contact</td>
<td>{{teacher.teacher_contact}}</td>
</tr>

</table>

<div class="profile-actions">

<a href="{% url 'Teacher:Editprofile' %}" class="profile-btn edit-btn">
Edit Profile
</a>

<a href="{% url 'Teacher:Changepass' %}" class="profile-btn password-btn">
Change Password
</a>

</div>

</div>

</div>

{% endblock %}
