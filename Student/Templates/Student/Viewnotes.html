{% extends 'Student/Head.html' %}
{% load static %}

{% block content %}
<div class="container-fluid py-4">
    <div class="row pt-4 justify-content-center">
        <div class="col-lg-12">
            <!-- Header Section -->
            <div class="d-flex align-items-center justify-content-between mb-4">
                <div>
                    <h2 class="h3 fw-bold mb-1">Digital Resource Repository</h2>
                    <p class="text-muted small mb-0">Browse and download academic materials, clinical guides, and faculty lecture notes</p>
                </div>
                <div class="bg-primary bg-opacity-10 text-primary p-3 rounded-circle shadow-sm">
                    <i class="fas fa-library fa-2x"></i>
                </div>
            </div>

            <!-- Repository Filters -->
            <div class="card bg-white bg-opacity-5 border border-white border-opacity-10 rounded-4 shadow-sm mb-5 animate-slideIn">
                <div class="card-body p-4">
                    <div class="row g-4 align-items-end">
                        <div class="col-md-5">
                            <label class="form-label text-muted small fw-bold uppercase">Academic Semester</label>
                            <select name="sel_semester" id="sel_semester" class="form-select bg-dark border-secondary text-white py-2 shadow-sm" required>
                                <option value="">-- Choose Semester --</option>
                                {% for i in semesterdata %}
                                <option value="{{i.id}}">{{i.semester_name}}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-5">
                            <label class="form-label text-muted small fw-bold uppercase">Specific Subject Module</label>
                            <select name="sel_subject" id="sel_subject" class="form-select bg-dark border-secondary text-white py-2 shadow-sm">
                                <option value="">-- [None] --</option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <button class="btn btn-outline-primary w-100 py-2 rounded-3 shadow-sm" disabled>
                                <i class="fas fa-search me-2"></i>Filter
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Repository Content Journal -->
            <div id="result" class="animate-fadeIn">
                <div class="text-center py-5 text-muted opacity-50">
                    <i class="fas fa-books fa-4x mb-4 d-block"></i>
                    Select a semester to initialize the digital repository list.
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script>
    $("#sel_semester").change(function () {
        var semid = $(this).val();
        var ur = "{% url 'Student:AjaxSubject' %}";
        $.ajax({
            url: ur,
            data: { semid: semid },
            success: function (data) {
                $("#sel_subject").html(data);
            },
        });
    });

    $("#sel_subject").change(function () {
        var subid = $(this).val();
        var ur = "{% url 'Student:Ajaxnotes' %}";
        $.ajax({
            url: ur,
            data: { subid: subid },
            success: function (data) {
                $("#result").html(data);
            },
        });
    });
</script>
{% endblock %}
