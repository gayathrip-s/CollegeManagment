{% extends 'Student/Head.html' %}
{% load static %}

{% block content %}
<div class="container-fluid py-4">
    <div class="row pt-5 justify-content-center">
        <div class="col-lg-5">
            <!-- Modification Panel -->
            <div class="card bg-white bg-opacity-5 border border-white border-opacity-10 rounded-4 shadow-lg overflow-hidden animate-fadeIn">
                <div class="card-body p-5">
                    <div class="text-center mb-5">
                        <div class="bg-primary bg-opacity-10 text-primary p-4 rounded-circle d-inline-block shadow-sm">
                            <i class="fas fa-user-edit fa-3x"></i>
                        </div>
                        <h2 class="h3 fw-bold mt-4 mb-2 text-white">Update Academic Credentials</h2>
                        <p class="text-muted small">Synchronize your personal profile with institutional records</p>
                    </div>

                    <form action="" method="post">
                        {% csrf_token %}
                        <div class="mb-4">
                            <label class="form-label text-muted small fw-bold uppercase letter-spacing-1">Full Legal Name</label>
                            <input type="text" required name="txt_name" id="txt_name" value="{{ student.student_name }}" class="form-control bg-dark border-secondary text-white py-2 shadow-sm" pattern="^[A-Z]+[a-zA-Z ]*$" title="Introductory letter must be a capital.">
                        </div>
                        <div class="mb-4">
                            <label class="form-label text-muted small fw-bold uppercase letter-spacing-1">Official Email</label>
                            <input type="email" required name="txt_email" id="txt_email" value="{{ student.student_email }}" class="form-control bg-dark border-secondary text-white py-2 shadow-sm">
                        </div>
                        <div class="mb-4">
                            <label class="form-label text-muted small fw-bold uppercase letter-spacing-1">Primary Contact Number</label>
                            <input type="text" required name="txt_contact" id="txt_contact" value="{{ student.student_contact }}" class="form-control bg-dark border-secondary text-white py-2 shadow-sm" pattern="[6-9]{1}[0-9]{9}" title="Must be a valid 10-digit mobile sequence.">
                        </div>
                        <div class="mb-4">
                            <label class="form-label text-muted small fw-bold uppercase letter-spacing-1">Residential Address</label>
                            <textarea required name="txt_address" id="txt_address" class="form-control bg-dark border-secondary text-white py-2 shadow-sm" rows="3">{{ student.student_address }}</textarea>
                        </div>

                        <div class="d-grid mt-5">
                            <button type="submit" class="btn btn-primary py-3 rounded-pill fw-bold transform-active transition-all shadow-lg">
                                <i class="fas fa-save me-2"></i>Persist Profile Changes
                            </button>
                        </div>
                    </form>
                </div>
                
                <div class="bg-white bg-opacity-5 py-3 border-top border-white border-opacity-10 text-center">
                    <a href="{% url 'Student:Myprofile' %}" class="text-muted small text-decoration-none hover-underline"><i class="fas fa-arrow-left me-1"></i> Return to Portfolio</a>
                </div>
            </div>
        </div>
    </div>
</div>

{% if msg %}
<script>
    alert("{{msg}}");
    window.location="{% url 'Student:Myprofile' %}";
</script>
{% endif %}
{% endblock %}
