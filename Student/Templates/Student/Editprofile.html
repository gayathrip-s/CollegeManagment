{% extends 'Student/Head.html' %}
{% block content %}

<style>

.editprofile-wrapper{
display:flex;
justify-content:center;
align-items:center;
padding:40px 0;
}

.editprofile-card{
width:500px;
background:rgba(255,255,255,0.95);
border-radius:15px;
box-shadow:0 15px 35px rgba(0,0,0,0.2);
padding:30px;
animation:fadeSlide 0.8s ease;
}

@keyframes fadeSlide{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.editprofile-header{
background:linear-gradient(135deg,#4e73df,#224abe);
color:white;
text-align:center;
padding:12px;
border-radius:10px;
font-size:20px;
font-weight:600;
margin-bottom:20px;
}

.editprofile-table{
width:100%;
}

.editprofile-table td{
padding:10px;
font-weight:500;
}

.editprofile-input{
width:100%;
padding:8px 10px;
border-radius:8px;
border:1px solid #ccc;
transition:0.3s;
}

.editprofile-input:focus{
border-color:#4e73df;
box-shadow:0 0 6px rgba(78,115,223,0.4);
outline:none;
}

.editprofile-btn{
background:#28a745;
color:white;
border:none;
padding:8px 20px;
border-radius:25px;
font-weight:500;
transition:0.3s;
}

.editprofile-btn:hover{
background:#218838;
transform:scale(1.05);
}

</style>

<div class="editprofile-wrapper">

<div class="editprofile-card">

<div class="editprofile-header">
<i class="fa fa-user-edit"></i> Edit Profile
</div>

<form action="" method="post">
{% csrf_token %}

<table class="editprofile-table">

<tr>
<td>Name</td>
<td>
<input type="text" required name="txt_name" id="txt_name"
value="{{student.student_name}}"
class="editprofile-input"
title="Name Allows Only Alphabets,Spaces and First Letter Must Be Capital Letter"
pattern="^[A-Z]+[a-zA-Z ]*$">
</td>
</tr>

<tr>
<td>Email</td>
<td>
<input type="email" required name="txt_email" id="txt_email"
value="{{student.student_email}}"
class="editprofile-input">
</td>
</tr>

<tr>
<td>Contact</td>
<td>
<input type="text" required name="txt_contact" id="txt_contact"
value="{{student.student_contact}}"
class="editprofile-input"
pattern="[6-9]{1}[0-9]{9}"
title="Phone number with 7-9 and remaining 9 digits with 0-9">
</td>
</tr>

<tr>
<td>Address</td>
<td>
<input type="text" required name="txt_address" id="txt_address"
value="{{student.student_address}}"
class="editprofile-input">
</td>
</tr>

<tr>
<td colspan="2" align="center">

<button type="submit" class="editprofile-btn">
<i class="fa fa-save"></i> Update
</button>

</td>
</tr>

</table>

</form>

</div>

</div>

{% if msg %}

<script>
alert("{{msg}}")
window.location="{% url 'Student:Myprofile' %}"
</script>

{% endif %}

{% endblock %}
