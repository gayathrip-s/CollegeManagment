{% extends 'Guest/Head.html' %}
{% load static %}
{% block content %}
<style>
    .auth-wrapper { min-height:90vh; display:flex; align-items:center; justify-content:center; background: radial-gradient(circle at 50% 10%, rgba(99,102,241,0.1), transparent); }
    .auth-card { background:rgba(255,255,255,0.04); backdrop-filter:blur(20px); border:1px solid rgba(255,255,255,0.1); border-radius:32px; padding:3.5rem; width:100%; max-width:480px; box-shadow:0 25px 50px rgba(0,0,0,0.3); position:relative; overflow:hidden; }
    .auth-card::before { content:''; position:absolute; top:0;left:0; width:100%; height:5px; background:linear-gradient(90deg,#6366f1,#a855f7); }
    .auth-icon { width:80px;height:80px; background:rgba(99,102,241,0.1); color:#818cf8; border-radius:20px; display:flex; align-items:center; justify-content:center; font-size:2.5rem; margin:0 auto 2rem; border:1px solid rgba(99,102,241,0.2); }
    .auth-label { color:rgba(255,255,255,0.7)!important; font-size:0.82rem; text-transform:uppercase; letter-spacing:1px; font-weight:600; display:block; margin-bottom:0.5rem; }
    .auth-input-group { position:relative; margin-bottom:1.5rem; }
    .auth-input-group i { position:absolute; left:18px; top:50%; transform:translateY(-50%); color:rgba(255,255,255,0.3); z-index:10; }
    .auth-input-group input { background:rgba(255,255,255,0.05)!important; border:1px solid rgba(255,255,255,0.1)!important; border-radius:14px!important; padding:1rem 1rem 1rem 48px!important; color:white!important; width:100%; }
    .auth-input-group input:focus { border-color:#6366f1!important; box-shadow:0 0 0 4px rgba(99,102,241,0.15); outline:none; }
    .auth-btn { background:linear-gradient(135deg,#6366f1,#a855f7); border:none; padding:1.1rem; border-radius:14px; font-weight:700; transition:all 0.3s ease; box-shadow:0 10px 20px rgba(99,102,241,0.3); margin-top:1rem; width:100%; color:white; }
    .auth-btn:hover { transform:translateY(-2px); box-shadow:0 15px 30px rgba(99,102,241,0.4); }
    .back-link { color:rgba(255,255,255,0.4); text-decoration:none; font-size:0.85rem; }
    .back-link:hover { color:#818cf8; }
    .alert-dark-msg { background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.2); color:#fca5a5; border-radius:12px; padding:0.85rem 1rem; margin-bottom:1.5rem; font-size:0.9rem; }
    .strength-bar { height: 6px; border-radius: 10px; margin-top: 8px; background: rgba(255,255,255,0.05); overflow: hidden; }
    .strength-fill { height: 100%; border-radius: 10px; transition: all 0.3s; width: 0; }
</style>

<div class="auth-wrapper">
    <div class="auth-card">
        <div class="text-center mb-4">
            <div class="auth-icon shadow-lg"><i class="fas fa-lock-open"></i></div>
            <h2 class="fw-bold text-white mb-2">Reset Your Password</h2>
            <p class="text-white-50 small">OTP verified ✓ — Choose a strong new password</p>
        </div>

        {% if msg %}
        <div class="alert-dark-msg"><i class="fas fa-exclamation-circle me-2"></i>{{ msg }}</div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <label class="auth-label">New Password</label>
            <div class="auth-input-group">
                <i class="fas fa-key"></i>
                <input type="password" name="txt_newpassword" id="newpass" 
                    placeholder="••••••••" 
                    pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
                    title="Min 8 chars, 1 uppercase, 1 lowercase, 1 number"
                    required onkeyup="evalStrength(this.value)">
            </div>
            <div class="strength-bar mb-3"><div class="strength-fill" id="strength-fill"></div></div>
            <div id="strength-msg" class="small mb-3" style="min-height:20px;"></div>

            <label class="auth-label">Confirm New Password</label>
            <div class="auth-input-group">
                <i class="fas fa-lock"></i>
                <input type="password" name="txt_confirmpassword" id="confpass" placeholder="••••••••" required onkeyup="checkMatch()">
            </div>
            <div id="match-msg" class="small mb-2" style="min-height:20px;"></div>

            <button type="submit" class="auth-btn">
                <i class="fas fa-save me-2"></i> Update Password
            </button>
            <div class="text-center mt-4">
                <a href="{% url 'Guest:Login' %}" class="back-link"><i class="fas fa-arrow-left me-1"></i> Back to Login</a>
            </div>
        </form>
    </div>
</div>

<script>
function evalStrength(val) {
    const fill = document.getElementById('strength-fill');
    const msg  = document.getElementById('strength-msg');
    if (val.length === 0) { fill.style.width='0'; fill.style.background=''; msg.innerHTML=''; return; }
    if (val.length < 6) {
        fill.style.width='25%'; fill.style.background='#ef4444';
        msg.innerHTML='<span style="color:#ef4444">Weak password</span>';
    } else if (val.match(/[a-z]/) && val.match(/[A-Z]/) && val.match(/[0-9]/)) {
        fill.style.width='100%'; fill.style.background='#22c55e';
        msg.innerHTML='<span style="color:#22c55e">Strong password ✓</span>';
    } else {
        fill.style.width='60%'; fill.style.background='#f59e0b';
        msg.innerHTML='<span style="color:#f59e0b">Medium – add numbers & uppercase</span>';
    }
}
function checkMatch() {
    const p  = document.getElementById('newpass').value;
    const c  = document.getElementById('confpass').value;
    const el = document.getElementById('match-msg');
    if (!c) { el.innerHTML=''; return; }
    el.innerHTML = p === c
        ? '<span style="color:#22c55e">Passwords match ✓</span>'
        : '<span style="color:#ef4444">Passwords do not match</span>';
}
</script>
{% endblock %}
