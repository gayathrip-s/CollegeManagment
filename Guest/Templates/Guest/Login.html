{% extends 'Guest/Head.html' %}
{% load static %}

{% block content %}
<style>
    .login-wrapper {
        min-height: 90vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(circle at 50% 10%, rgba(99, 102, 241, 0.1), transparent);
    }

    .login-card {
        background: rgba(255, 255, 255, 0.04);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 32px;
        padding: 4rem;
        width: 100%;
        max-width: 500px;
        box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
        position: relative;
        overflow: hidden;
    }

    .login-card::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 6px;
        background: linear-gradient(90deg, #6366f1, #a855f7);
    }

    .login-icon {
        width: 80px;
        height: 80px;
        background: rgba(99, 102, 241, 0.1);
        color: #818cf8;
        border-radius: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2.5rem;
        margin: 0 auto 2rem;
        border: 1px solid rgba(99, 102, 241, 0.2);
    }

    .login-card label {
        color: rgba(255, 255, 255, 0.7) !important;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 1px;
        font-weight: 600;
        margin-bottom: 0.5rem;
        display: block;
    }

    .auth-input-group {
        position: relative;
        margin-bottom: 1.5rem;
    }

    .auth-input-group i {
        position: absolute;
        left: 20px;
        top: 50%;
        transform: translateY(-50%);
        color: rgba(255, 255, 255, 0.3);
        z-index: 10;
    }

    .auth-input-group input {
        background: rgba(255, 255, 255, 0.05) !important;
        border: 1px solid rgba(255, 255, 255, 0.1) !important;
        border-radius: 16px !important;
        padding: 1rem 1rem 1rem 50px !important;
        color: white !important;
        width: 100%;
        transition: all 0.3s ease;
    }

    .auth-input-group input:focus {
        background: rgba(255, 255, 255, 0.08) !important;
        border-color: #6366f1 !important;
        box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        outline: none;
    }

    .auth-btn {
        background: linear-gradient(135deg, #6366f1, #a855f7);
        border: none;
        padding: 1.25rem;
        border-radius: 16px;
        font-weight: 700;
        letter-spacing: 1px;
        text-transform: uppercase;
        transition: all 0.3s ease;
        box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
        margin-top: 2rem;
        width: 100%;
        color: white;
    }

    .auth-btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 15px 30px rgba(99, 102, 241, 0.4);
    }

    .back-home {
        color: rgba(255, 255, 255, 0.4);
        text-decoration: none;
        font-size: 0.9rem;
        transition: color 0.3s ease;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin-top: 2rem;
    }

    .back-home:hover {
        color: #818cf8;
    }

    input::placeholder {
        color: rgba(255, 255, 255, 0.25) !important;
    }
</style>

<div class="login-wrapper">
    <div class="login-card animate-fadeIn">
        <div class="text-center mb-5">
            <div class="login-icon shadow-lg">
                <i class="fas fa-fingerprint"></i>
            </div>
            <h2 class="fw-bold text-white mb-2">Welcome Back</h2>
            <p class="text-white-50 small">Enter your credentials to access the portal</p>
        </div>

        <form action="" method="post">
            {% csrf_token %}
            <div class="form-group">
                <label>Email Identity</label>
                <div class="auth-input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" name="txt_mail" placeholder="name@college.edu" required>
                </div>
            </div>

            <div class="form-group">
                <label>Secret Password</label>
                <div class="auth-input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" name="txt_password" placeholder="••••••••" required>
                </div>
                <div class="text-end mt-1">
                    <a href="{% url 'Guest:forgot_password' %}"
                        style="color: rgba(99,102,241,0.8); font-size:0.82rem; text-decoration:none;">
                        <i class="fas fa-question-circle me-1"></i>Forgot Password?
                    </a>
                </div>
            </div>

            <button type="submit" class="auth-btn">
                Authenticate Session <i class="fas fa-arrow-right ms-2"></i>
            </button>


        </form>
    </div>
</div>

{% if msg %}
<script>
    alert("{{msg}}");
</script>
{% endif %}
{% endblock %}
