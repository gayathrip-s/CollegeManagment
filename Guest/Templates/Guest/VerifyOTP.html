{% extends 'Guest/Head.html' %}
{% load static %}
{% block content %}
<style>
    .auth-wrapper { min-height:90vh; display:flex; align-items:center; justify-content:center; background: radial-gradient(circle at 50% 10%, rgba(99,102,241,0.1), transparent); }
    .auth-card { background:rgba(255,255,255,0.04); backdrop-filter:blur(20px); border:1px solid rgba(255,255,255,0.1); border-radius:32px; padding:3.5rem; width:100%; max-width:480px; box-shadow:0 25px 50px rgba(0,0,0,0.3); position:relative; overflow:hidden; }
    .auth-card::before { content:''; position:absolute; top:0;left:0; width:100%; height:5px; background:linear-gradient(90deg,#6366f1,#a855f7); }
    .auth-icon { width:80px;height:80px; background:rgba(99,102,241,0.1); color:#818cf8; border-radius:20px; display:flex; align-items:center; justify-content:center; font-size:2.5rem; margin:0 auto 2rem; border:1px solid rgba(99,102,241,0.2); }
    .auth-label { color:rgba(255,255,255,0.7)!important; font-size:0.82rem; text-transform:uppercase; letter-spacing:1px; font-weight:600; display:block; margin-bottom:0.5rem; }
    .auth-input-group { position:relative; margin-bottom:1.5rem; }
    .auth-input-group i { position:absolute; left:18px; top:50%; transform:translateY(-50%); color:rgba(255,255,255,0.3); z-index:10; }
    .auth-input-group input { background:rgba(255,255,255,0.05)!important; border:1px solid rgba(255,255,255,0.1)!important; border-radius:14px!important; padding:1rem 1rem 1rem 48px!important; color:white!important; width:100%; letter-spacing:4px; font-size:1.4rem; text-align:center; }
    .auth-input-group input:focus { border-color:#6366f1!important; box-shadow:0 0 0 4px rgba(99,102,241,0.15); outline:none; }
    .auth-btn { background:linear-gradient(135deg,#6366f1,#a855f7); border:none; padding:1.1rem; border-radius:14px; font-weight:700; transition:all 0.3s ease; box-shadow:0 10px 20px rgba(99,102,241,0.3); margin-top:1.5rem; width:100%; color:white; }
    .auth-btn:hover { transform:translateY(-2px); box-shadow:0 15px 30px rgba(99,102,241,0.4); }
    .back-link { color:rgba(255,255,255,0.4); text-decoration:none; font-size:0.85rem; }
    .back-link:hover { color:#818cf8; }
    .alert-dark-msg { background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.2); color:#fca5a5; border-radius:12px; padding:0.85rem 1rem; margin-bottom:1.5rem; font-size:0.9rem; }
    .otp-info { background:rgba(99,102,241,0.08); border:1px solid rgba(99,102,241,0.15); color:rgba(255,255,255,0.7); border-radius:12px; padding:0.85rem 1rem; margin-bottom:1.5rem; font-size:0.85rem; }
</style>

<div class="auth-wrapper">
    <div class="auth-card">
        <div class="text-center mb-4">
            <div class="auth-icon shadow-lg"><i class="fas fa-shield-alt"></i></div>
            <h2 class="fw-bold text-white mb-2">Enter Your OTP</h2>
            <p class="text-white-50 small">We've sent a 6-digit code to <strong class="text-primary">{{ email }}</strong></p>
        </div>

        <div class="otp-info"><i class="fas fa-info-circle me-2 text-primary"></i>This OTP is valid for <strong>10 minutes</strong>. Check your inbox.</div>

        {% if msg %}
        <div class="alert-dark-msg"><i class="fas fa-exclamation-circle me-2"></i>{{ msg }}</div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <label class="auth-label">6-Digit OTP Code</label>
            <div class="auth-input-group">
                <i class="fas fa-hashtag"></i>
                <input type="text" name="txt_otp" placeholder="• • • • • •" maxlength="6" pattern="\d{6}" required autofocus>
            </div>
            <button type="submit" class="auth-btn">
                <i class="fas fa-check-circle me-2"></i> Verify OTP
            </button>
            <div class="text-center mt-4 d-flex justify-content-between">
                <a href="{% url 'Guest:forgot_password' %}" class="back-link"><i class="fas fa-redo me-1"></i> Resend OTP</a>
                <a href="{% url 'Guest:Login' %}" class="back-link"><i class="fas fa-arrow-left me-1"></i> Back to Login</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
