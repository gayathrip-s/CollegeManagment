{% extends 'Admin/Header.html' %}

{% block content %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Purpose</title>

<style>
body{
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(120deg,#e0f7fa,#e3f2fd);
    margin:0;
    padding:40px;
}

/* Main Container */
.container{
    width:70%;
    margin:auto;
}

/* Card Design */
.card{
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0px 4px 10px rgba(0,0,0,0.15);
    margin-bottom:30px;
}

/* Heading */
.heading{
    text-align:center;
    font-size:26px;
    font-weight:bold;
    margin-bottom:20px;
    color:#333;
}

/* Form Table */
.form-table{
    width:100%;
}

.form-table td{
    padding:10px;
}

/* Input */
.input-box{
    width:95%;
    padding:8px;
    border-radius:6px;
    border:1px solid #ccc;
}

/* Button */
.submit-btn{
    background:#2196f3;
    color:white;
    border:none;
    padding:8px 18px;
    border-radius:6px;
    cursor:pointer;
}

.submit-btn:hover{
    background:#0d8bf2;
}

/* Data Table */
.data-table{
    width:100%;
    border-collapse:collapse;
}

.data-table th,
.data-table td{
    padding:10px;
    text-align:center;
}

.data-table th{
    background:#2196f3;
    color:white;
}

.data-table tr:nth-child(even){
    background:#f5f5f5;
}

/* Delete Button */
.delete-btn{
    background:#e8625f;
    color:white;
    padding:5px 10px;
    text-decoration:none;
    border-radius:5px;
}

.delete-btn:hover{
    background:#c62828;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
<div class="heading">Add Purpose</div>

<form action="" method="post">
{% csrf_token %}

<table class="form-table">
<tr>
<td><b>Purpose</b></td>
<td><input type="text" name="txt_purpose" id="txt_purpose" class="input-box"></td>
</tr>

<tr>
<td colspan="2" align="center">
<input type="submit" value="Submit" class="submit-btn">
</td>
</tr>
</table>

</form>
</div>


<div class="card">

<div class="heading">Purpose List</div>

<table border="1" class="data-table">

<tr>
<th>SlNo</th>
<th>Purpose</th>
<th>Action</th>
</tr>

{% for p in purposedata %}

<tr>
<td>{{ forloop.counter }}</td>
<td>{{ p.purpose_name }}</td>
<td>
<a href="{% url 'Admin:delpurpose' p.id %}" class="delete-btn">Delete</a>
</td>
</tr>

{% endfor %}

</table>

</div>

</div>

</body>
</html>

{% if msg %}
<script>
alert("{{msg}}")
window.location = "{% url 'Admin:Purpose' %}"
</script>
{% endif %}
{% endblock %}
